site_name: Metaphysical Wiki
repo_url: https://github.com/aernesto/metaphysical-wiki

theme:
  name: material
  features:
    - navigation.tabs # Optional: creates horizontal tabs for top-level directories

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
